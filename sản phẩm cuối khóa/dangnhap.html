<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>đăng nhập</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        /* setup */

        a {
            text-decoration: none;
            color: black;
        }

        img {
            display: block;
        }

        /*  */

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        footer {
            background: #fff;
            padding: 15px 20px;
            border-bottom: 1px solid #ddd;
            text-align: center;
        }

        .login-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-wrapper-card {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            width: 100%;
            max-width: 400px;
        }

        .login-wrapper-card h2 {
            margin-top: 0;
            color: #007bff;
            text-align: center;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }

        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }

        .btn-login {
            width: 100%;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        .btn-login:hover {
            background: #218838;
        }

        .switch-mode {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .switch-mode a {
            color: #007bff;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <form id="form">
        <div class="form-group">
            <label>Email</label>
            <input type="email"  id="email" placeholder="Enter email" required>
        <div class="form-group">
            <label>Password</label>
            <input type="password"  id="password" placeholder="Password" required>
        </div>
        <button id="submit" onclick="register()">
            <a href="trangchu.html">Submit</a>
        </button>
    </form>
    <script type="module" src="/sản phẩm cuối khóa/confirm.js"></script>
</body>

</html>
