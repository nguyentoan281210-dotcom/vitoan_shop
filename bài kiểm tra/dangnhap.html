<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;

        }

        /* setup */

        a {
            text-decoration: none;
            color: black;
        }

        img {
            display: block;
        }

        /*  */

        #dangnhap {
            display: flex;
            justify-content: center;
            font-size: 20px;
            margin-top: 50px;

        }

        .btn {
            display: flex;
            justify-self: center;
            margin-top: 10px;
            color: blue;
            padding: 5px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="dangnhap">
        <form id="dang">
            <div class="nhap">
                <label>Email</label>
                <input type="email" id="email" placeholder="Bắt buộc có @" required>
            </div>
            <div class="hap">
                <label>Password</label>
                <input type="password" id="password" placeholder="Tối thiểu 6 kí tự" required>
            </div>
            <button class="btn"  onclick="register()">
                <a href="index.html">Đăng nhập</a>
            </button>
        </form>
    </div>
</body>

</html>
