<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        * {
            padding: 0;
            margin: 0;
            box-sizing: border-box;

        }

        /* setup */

        a {
            text-decoration: none;
            color: black;
        }

        img {
            display: block;
        }

        /*  */
        #dangky {
            display: flex;
            justify-content: center;
            font-size: 20px;
            margin-top: 50px;

        }

        .btn {
            display: flex;
            justify-self: center;
            margin-top: 10px;
            color: blue;
            padding: 5px;
            border-radius: 10px;
        }
    </style>
</head>

<body>
    <div id="dangky">
        <form id="dang">
            <div class="ky">
                <label>email</label>
                <input type="email" id="email" placeholder="Bắt buộc có @" required>
            </div>
            <div class="ki">
                <label>password</label>
                <input type="password" id="password" placeholder="Tối thiểu 6 kí tự" required>
            </div>
            <button class="btn"  onclick="register()">
                <a href="dangnhap.html">Đăng ký</a>
            </button>
            <p id="message"></p>
        </form>
    </div>

    <script type="module" src="config.js"></script>
</body>

</html>
